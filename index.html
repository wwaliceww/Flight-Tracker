<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Alice & Theo Flight Tracker – 3D Globe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- FIX: added defer -->
  <script src="https://unpkg.com/three@0.158.0/build/three.min.js" defer></script>
  <script src="https://unpkg.com/globe.gl" defer></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #020617, #020617 40%, #000 100%);
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 1rem 1.75rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: baseline;
      backdrop-filter: blur(10px);
      background: linear-gradient(to right, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.6));
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 { margin: 0; font-size: 1.4rem; }
    header p { margin: 0; opacity: 0.8; font-size: 0.9rem; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(260px, 1.2fr);
      min-height: 0;
    }

    /* ✅ FIXED HERE */
    #globe-container {
      position: relative;
      height: 70vh; /* was min-height */
      overflow: hidden;
    }

    #globeViz {
      width: 100%;
      height: 100%;
    }

    .globe-hint {
      position: absolute;
      left: 1.25rem;
      bottom: 1.25rem;
      font-size: 0.8rem;
      color: #9ca3af;
      background: rgba(15, 23, 42, 0.85);
      padding: 0.5rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      backdrop-filter: blur(12px);
      z-index: 5;
    }

    #flight-info {
      position: absolute;
      left: 1.25rem;
      top: 1.25rem;
      max-width: 320px;
      background: rgba(15, 23, 42, 0.96);
      border-radius: 1rem;
      border: 1px solid rgba(148, 163, 184, 0.5);
      padding: 0.9rem 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      z-index: 6;
      display: none;
    }

    #flight-info h3 { margin: 0 0 0.35rem; font-size: 1rem; }

    #flight-info p {
      margin: 0.1rem 0;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    #flight-info .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9ca3af;
    }

    #flight-info .notes { margin-top: 0.45rem; font-style: normal; color: #e5e7eb; }

    aside {
      padding: 1.25rem 1.5rem 1.5rem;
      background: radial-gradient(circle at top left, #020617, #020617 40%, #000 100%);
      border-left: 1px solid rgba(148, 163, 184, 0.25);
      overflow-y: auto;
    }

    footer {
      padding: 0.6rem 1.5rem;
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: right;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      background: #020617;
    }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      #globe-container { height: 50vh; }
      aside { border-left: none; border-top: 1px solid rgba(148, 163, 184, 0.25); }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <h1>Alice & Theo Global Flight Tracker</h1>
      <p>Saving the relationship, not the planet &lt;3</p>
    </div>
  </header>

  <main>
    <section id="globe-container">
      <div id="globeViz"></div>
      <div class="globe-hint">Drag to spin · Scroll to zoom · Click a route for details</div>
      <div id="flight-info"></div>
    </section>
    <aside></aside>
  </main>

  <footer>Made with ❤️</footer>

  <script>
    const globeElement = document.getElementById("globeViz");
    const infoPanel = document.getElementById("flight-info");

    const world = Globe()(globeElement)
      .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg")
      .backgroundColor("rgba(0,0,0,0)");

    // ✅ FIX: force correct sizing
    world.width(globeElement.clientWidth);
    world.height(globeElement.clientHeight);

    // ✅ FIX: keep responsive
    window.addEventListener("resize", () => {
      world.width(globeElement.clientWidth);
      world.height(globeElement.clientHeight);
    });
  </script>
</body>
</html>
